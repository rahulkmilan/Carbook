{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Registration Form</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url("{% static 'images/bg_1.jpg' %}");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        label{
            color: #024c79;
        }

        .form-container {
            background-color: #F7F7F7;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
            color: #00609c;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="number"],
        .form-group input[type="file"],
        .form-group select {
            width: 95%;
            padding: 10px;
            border: 1px solid #CED4DA;
            border-radius: 5px;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }

        .form-group input[type="file"] {
            border: none;
        }

        .btn-primary {
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            color: #fff;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn-primary:hover {
            background-color:  #0056b3;
            
        }

        @media screen and (max-width: 576px) {
            .form-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    
    <!-- Driver registration form section -->
    <div class="form-container">
        <h2 class="form-header">Driver Registration</h2>
        <!-- Custom driver registration form -->
        <form method="post" action="driver-reg" enctype="multipart/form-data">
            <div class="form-group">
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="fname">
            </div>
            <div class="form-group">
                <label for="lname">Last Name</label>
                <input type="text" id="lname" name="lname">
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-group">
                <label for="pno">Phone Number</label>
                <input type="text" id="pno" name="pno">
            </div>
            <div class="form-group">
                <label for="dl">Driver's License</label>
                <input type="file" id="dl" name="dl" accept="/media/">
            </div>
            <button type="submit" class="btn-primary">Register</button>
        </form>
        <!-- End of custom driver registration form -->
    </div>
    <!-- End of driver registration form section -->

</body>
</html>
